  <main class="mt-5 pt-4">
    <section class="container my-5">
      <h1 class="text-center mb-4" data-aos="fade-up">Contacto</h1>
      <form class="row g-3" action="#" method="post" data-aos="fade-up" data-aos-delay="100">
        <div class="col-md-6">
          <label for="name" class="form-label">Nombre</label>
          <input type="text" class="form-control" id="name" name="name" required aria-required="true">
        </div>
        <div class="col-md-6">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required aria-required="true">
        </div>
        <div class="col-12">
          <label for="message" class="form-label">Mensaje</label>
          <textarea class="form-control" id="message" name="message" rows="5" required aria-required="true"></textarea>
        </div>
        <div class="col-12 text-center">
          <button type="submit" class="btn btn-custom card-hover">Enviar</button>
        </div>
      </form>
    </section>
